apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinel-backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: sentinel-backend
  template:
    metadata:
      labels:
        app: sentinel-backend
    spec:
      containers:
      - name: backend
        image: sentinel-backend:latest
        ports:
        - containerPort: 8000
